<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
   <title>회원가입</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" th:href="@{/css/global.css}">
   <link rel="stylesheet" th:href="@{/css/join.css}">
   <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
   <script defer th:src="@{/js/menuBar.js}"></script>
   <script defer th:src="@{/js/join.js}"></script>
</head>

<body>
   <!-- Header 프래그먼트 삽입 -->
   <div th:replace="~{fragments/header :: headerFragment}"></div>

   <main id="section-main" class="main-content">
      <div class="join-area">
         <form class="join-form" id="join-form" action="/user/joinProc" method="POST">
            <div class="login-form-background"></div>
            <h1 class="join_title">회원가입</h1>

            <div class="input-group">
               <input type="text" name="userName" id="userName" placeholder="이름">
            </div>

            <div class="input-group">
               <input type="text" name="userId" id="userId" placeholder="아이디 (3~5자 사이)">
               <div id="confirmId"></div>
            </div>

            <div class="input-group">
               <input type="password" name="userPwd" id="userPwd" placeholder="비밀번호">
            </div>

            <div class="input-group">
               <input type="password" name="pwdConfirm" id="pwdConfirm" placeholder="비밀번호 확인">
               <div id="confirmPwd"></div>
            </div>

            <div class="input-group">
               <input type="text" name="email" id="email" placeholder="이메일">
               <div id="confirmEmail"></div>
            </div>

            <button type="button" class="joinBtn" id="joinBtn">회원가입</button>
         </form>

      </div>
   </main>

   <!-- Footer 프래그먼트 삽입 -->
   <div th:replace="~{fragments/footer :: footerFragment}"></div>
</body>

</html>
