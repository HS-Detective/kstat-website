<!DOCTYPE html>
<html lang="ko" xmlns:th="http://thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script defer th:src="@{/js/menuBar.js}"></script>
  <script defer th:src="@{/js/login.js}"></script>
</head>

<body>
  <!-- Header 프래그먼트 삽입 -->
  <div th:replace="~{fragments/header :: headerFragment}"></div>
  
  <main id="section-main" class="main-content">
    <div class="login-area">
      <form action="/user/loginProc" method="POST" class="login-form" id="login-form">
        <div class="login-form-background"></div>
        <h1 class="login-title">로그인</h1>
        <div class="input-group">
          <input type="text" id="userId" name="userId" placeholder="아이디">
        </div>
        <div class="input-group">
          <input type="password" id="userPwd" name="userPwd" placeholder="비밀번호">
        </div>
        <button type="button" class="login_button" id="login_button">로그인</button>
        <div class="separator">
          <hr class="line">
          <span class="separator-text">아직 회원이 아니신가요?</span>
          <hr class="line">
        </div>
         <button type="button" class="sign-up" id="sign-up">회원가입</button>
      </form>
      
    </div>
  </main>
  
  <!-- Footer 프래그먼트 삽입 -->
  <div th:replace="~{fragments/footer :: footerFragment}"></div>
  
</body>

</html>
