<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Inter:wght@400&display=swap"
    rel="stylesheet">

  <title>무역 뉴스 목록</title>

  <link rel="stylesheet" th:href="@{/css/newsList.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/board.css}">

  <script th:src="@{/js/newsList.js}" defer></script>
  <script th:src="@{/js/menuBar.js}" defer></script>
</head>

<body>
  <!-- Header 프래그먼트 삽입 -->
  <div th:replace="~{fragments/header :: headerFragment}"></div>

  <!-- 게시판 본문 영역 -->
  <section id="news-content">
    <div class="content-container">

      <!-- 게시판 목록 제목 -->
      <div class="page-title-wrapper">
        <h1 class="news-heading">무역 뉴스</h1>
      </div>

      <p class="news-info-box">
        최신 무역 뉴스를 한눈에 확인할 수 있는 공간입니다. <br>
      네이버 뉴스 API를 활용해 국내외 무역과 관련된 실시간 뉴스를 자동으로 수집하고 있습니다. <br>
      관심 있는 이슈나 정책, 시장 동향 등 다양한 무역 정보를 빠르게 받아보세요.
      </p>

      <div class="news-controls">
        <div class="news-stats">
          <span>Total : <span th:text="${totalCount}">0</span></span>
          <span>Page : <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span></span>
        </div>

        <!-- 검색 영역 -->
        <form class="search-area" th:action="@{/news/newsList}" method="get">
          <!-- 실제 전달될 값 -->
          <input type="hidden" id="searchCategory" name="searchCategory" th:value="${searchCategory}">
          <div class="dropdown-select">
            <button class="dropdown-toggle" type="button">
              <span class="selected-option">선택</span>
              <img th:src="@{/images/dropdown_arrow.png}" alt="dropdown arrow">
            </button>
            <ul class="dropdown-menu">
              <li data-value="newsTitle">제목</li>
              <li data-value="newsPubdate">발행일</li>
            </ul>
          </div>

          <div class="search-input-wrapper">
            <input type="text" name="searchKeyword" placeholder="검색어 입력"
                   th:data-value="${searchKeyword}">
          </div>
          <button class="search-btn" type="submit">
            <span>검색</span>
            <img th:src="@{/images/search_icon.png}" alt="search icon">
          </button>
        </form>
      </div>

      <!-- 뉴스 목록 테이블 (Thymeleaf 방식) -->
      <div class="table-container">
        <table class="news-table">
          <thead>
            <tr>
              <th>번호</th>
              <th>제목</th>
              <th>발행일</th>
            </tr>
          </thead>
          <tbody>
            <!-- 
              컨트롤러에서 넘겨준 "newsList"를 반복합니다.
              데이터가 없으면 이 부분은 아예 출력되지 않습니다.
            -->
            <tr th:each="news,iter : ${newsList}">
              <!-- 번호: newsSeq 필드 사용 -->
              <td th:text="${ (currentPage - 1) * pageSize + iter.index + 1 }"></td>

              <!-- 제목: newsTitle 필드를 내용으로, newsLink를 링크로 사용 -->
              <td class="news-title">
                <a th:href="${news.newsLink}" th:text="${news.newsTitle}" target="_blank"></a>
              </td>

              <!-- 발행일: newsPubDate 필드 사용 (날짜 형식 지정) -->
              <td th:text="${#temporals.format(news.newsPubdate, 'yyyy-MM-dd')}"></td>
            </tr>

            <!-- 만약 뉴스 데이터가 하나도 없을 경우 보여줄 메시지 -->
            <tr th:if="${#lists.isEmpty(newsList)}">
                <td colspan="3" style="text-align: center;">등록된 뉴스가 없습니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- Thymeleaf 방식에서는 데이터를 가져오는 script 태그가 필요 없습니다. -->      
      
        <!-- 페이지네이션: 그룹 표시 (navi 사용 / 안전 가드 포함) -->
   <nav class="pagination"
        th:if="${totalPages > 1 and navi != null and navi.startPageGroup >= 1 and navi.endPageGroup >= navi.startPageGroup}">
     <ul>
       <!-- 처음 / 이전 -->
       <li th:classappend="${currentPage == 1} ? 'disabled'">
         <a th:if="${currentPage > 1}"
            aria-label="첫 페이지"
            th:href="@{/news/newsList(page=1, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}">
           <!-- 왼쪽 이중 화살표 SVG -->
           <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 19l-7-7 7-7v14zm9 0l-7-7 7-7v14z"/></svg>
         </a>
       </li>
       <li th:classappend="${currentPage == 1} ? 'disabled'">
         <a th:if="${currentPage > 1}"
            aria-label="이전 페이지"
            th:href="@{/news/newsList(page=${currentPage - 1}, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}">
           <!-- 왼쪽 한 칸 화살표 SVG -->
           <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 19l-7-7 7-7v14z"/></svg>
         </a>
       </li>
   
       <!-- 그룹 숫자 -->
       <li th:each="p : ${#numbers.sequence(navi.startPageGroup, navi.endPageGroup)}">
         <a th:text="${p}"
            th:href="@{/news/newsList(page=${p}, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}"
            th:classappend="${p == currentPage} ? 'active' : ''"
            th:attr="aria-current=${p == currentPage} ? 'page' : null"></a>
       </li>
   
       <!-- 다음 / 마지막 -->
       <li th:classappend="${currentPage == totalPages} ? 'disabled'">
         <a th:if="${currentPage < totalPages}"
            aria-label="다음 페이지"
            th:href="@{/news/newsList(page=${currentPage + 1}, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}">
           <!-- 오른쪽 한 칸 화살표 SVG -->
           <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7V5z"/></svg>
         </a>
       </li>
       <li th:classappend="${currentPage == totalPages} ? 'disabled'">
         <a th:if="${currentPage < totalPages}"
            aria-label="마지막 페이지"
            th:href="@{/news/newsList(page=${totalPages}, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}">
           <!-- 오른쪽 이중 화살표 SVG -->
           <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5l7 7-7 7V5zm9 0l7 7-7 7V5z"/></svg>
         </a>
       </li>
     </ul>
   </nav>
      
    </div>
  </section>

  <!-- Footer 프래그먼트 삽입 -->
  <div th:replace="~{fragments/footer :: footerFragment}"></div>

</body>
</html>
