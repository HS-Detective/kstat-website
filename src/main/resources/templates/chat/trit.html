<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security6"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRIT Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/chat.css}" />

    <script>
      window.TRIT_BOOT = {
        sessionId: "[[${sessionId}]]",
        mode: "[[${mode}]]",
      };
    </script>
    <script defer src="/js/chat.js"></script>
    <script defer src="/js/menuBar.js"></script>
  </head>

  <body>
    <main
      id="chatbot"
      class="chatbot-container"
      role="application"
      aria-label="TRIT Chatbot"
    >
      <!-- Header (고정) -->
      <!-- 
    <header class="chatbot-header">
      <button class="close-button" aria-label="Close chat" id="closeBtn">
        <img th:src="@{/images/close_icon.svg}" alt="Close" />
      </button>
    </header>
-->

      <!-- Body (중앙 스크롤) -->
      <section id="chatBody" class="chatbot-body">
        <!-- 초기 인트로 & 6버튼 (mode === 'main') -->
        <section class="intro-section" id="intro" data-visible="true">
          <img
            src="/images/trit_icon.png"
            alt="TRIT mascot"
            class="mascot-avatar"
          />
          <div class="message-box">
            <p>
              <th:block sec:authorize="isAuthenticated()">
                <span sec:authentication="name"></span>님, 안녕하세요.
              </th:block>
              <th:block sec:authorize="isAnonymous()"> 안녕하세요. </th:block>
              <br />저는 K-stat 의 정보 탐색을 도와드릴 TRIT입니다.<br />하단의
              버튼을 누르시면 다양한 기능을 통해 필요한 정보를 간편하게 찾을 수
              있도록 안내해드립니다.<br />TRIT은 K-stat 이용자의 통계 접근성과
              활용 편의를 높이기 위해 지속적으로 개선해 나가고 있습니다.
            </p>
          </div>
          <nav class="actions-section" aria-label="Chatbot quick actions">
            <a
              href="#"
              class="action-card"
              data-mode="hs"
              data-new-session="true"
            >
              <!-- <img src="/images/search_icon.png" alt="" class="action-icon" /> -->
              <span class="action-label">HS code 추천 시스템</span>
            </a>
            <a
              href="#"
              class="action-card"
              data-mode="stats"
              data-new-session="true"
            >
              <!-- <img src="/images/I1_1084_1_1002.svg" alt="" class="action-icon" /> -->
              <span class="action-label">무역 통계 안내</span>
            </a>
            <a
              href="#"
              class="action-card"
              data-mode="nav"
              data-new-session="true"
            >
              <!-- <img src="/images/I1_1085_1_1016.svg" alt="" class="action-icon" /> -->
              <span class="action-label">메뉴 경로 안내</span>
            </a>
            <a
              href="#"
              class="action-card"
              data-mode="glossary"
              data-new-session="true"
            >
              <!-- <img src="/images/book_icon.png" alt="" class="action-icon" /> -->
              <span class="action-label">무역 용어</span>
            </a>
            <a href="#" class="action-card" data-mode="faq">
              <!-- <img src="/images/chat_icon.png" alt="" class="action-icon icon-bordered" /> -->
              <span class="action-label">FAQ</span>
            </a>
            <a
              href="https://unipass.customs.go.kr/clip/hsinfosrch/openULS0201001Q.do"
              class="action-card"
              target="_blank"
              rel="noopener"
            >
              <!-- <img src="/images/chat_icon.png" alt="" class="action-icon icon-bordered" /> -->
              <span class="action-label">속견표</span>
            </a>
          </nav>
        </section>

        <!-- 채팅 히스토리 (mode !== 'main') -->
        <main class="chat-history" id="history" hidden></main>
      </section>

      <!-- Footer (고정) : 입력창 / 메뉴 토글 -->
      <footer class="chat-footer" hidden>
        <button
          class="add-button"
          aria-label="Toggle quick menu"
          id="menuToggle"
        >
          <img th:src="@{/images/plus_icon.png}" alt="Add Icon" />
        </button>
        <div class="input-wrap">
          <textarea
            id="chatInput"
            class="chat-input"
            rows="1"
            maxlength="100"
            placeholder="무엇이 궁금하신가요?"
            aria-label="chat input"
          ></textarea>
          <!-- <div class="limit-hint"><span id="charCount">0</span>/100</div> -->
        </div>
        <button class="send-button" aria-label="Send chat" id="sendBtn">
          <img th:src="@{/images/send_icon_white.png}" alt="Send" />
        </button>
      </footer>

      <!-- 하단 메뉴 오버레이 (토글) -->
      <aside class="menu-overlay" id="menuOverlay" hidden>
        <div class="menu-grid">
          <button class="menu-button" data-mode="hs">
            HS code 추천 시스템
          </button>
          <button class="menu-button" data-mode="stats">무역 통계 안내</button>
          <button class="menu-button" data-mode="nav">메뉴 경로 안내</button>
          <button
            class="menu-button"
            data-mode="glossary"
            data-new-session="true"
          >
            무역 용어
          </button>
          <button class="menu-button" data-mode="faq">FAQ</button>
          <a
            class="menu-button"
            href="https://unipass.customs.go.kr/clip/hsinfosrch/openULS0201001Q.do"
            target="_blank"
            rel="noopener"
            >속견표</a
          >
        </div>
      </aside>
    </main>

    <!-- Detail Popup Modal -->
    <div id="detail-modal" class="detail-modal-overlay" hidden>
      <div class="detail-modal-content">
        <button id="detail-modal-close" class="detail-modal-close-btn">
          &times;
        </button>
        <div id="detail-modal-body">
          <!-- Content will be injected by JS -->
        </div>
      </div>
    </div>
  </body>
</html>
