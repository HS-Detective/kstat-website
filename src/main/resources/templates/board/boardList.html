<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Inter:wght@400&display=swap"
    rel="stylesheet">

  <title>게시판 목록</title>

  <link rel="stylesheet" th:href="@{/css/boardList.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/board.css}">

  <script th:src="@{/js/boardList.js}" defer></script>
  <script th:src="@{/js/menuBar.js}" defer></script>
</head>

<body>
  <!-- Header 프래그먼트 삽입 -->
  <div th:replace="~{fragments/header :: headerFragment}"></div>

  <!-- 게시판 본문 영역 -->
  <section id="board-content">
    <div class="content-container">

      <!-- 게시판 목록 제목 -->
      <div class="page-title-wrapper">
        <h1 class="board-heading">이용문의</h1>
      </div>

      <p class="board-info-box">
        챗봇이나 '처음이신가요?' 메뉴로 해결되지 않는 무역통계 조회 문제, <br>
        HS코드 검색 오류, 사이트 이용 불편사항 및 개선 의견 등을 남겨주세요. <br>
        더 나은 서비스를 위해 주신 의견은 소중히 반영하겠습니다.
      </p>

      <div class="board-controls">
        <div class="board-stats">
          <span>Total : <span th:text="${totalCount}">0</span></span>
          <span>Page :
           <span th:text="${(currentPage != null and totalPages != null) ? (currentPage > totalPages ? totalPages : (currentPage < 1 ? 1 : currentPage)) : 1}">1</span>
           /
           <span th:text="${totalPages != null ? (totalPages < 1 ? 1 : totalPages) : 1}">1</span>
        </span>
          
        </div>

        <!-- 검색 영역 -->
        <form class="search-area" th:action="@{/board/boardList}" method="get">
          <!-- 실제 전달될 값 -->
          <input type="hidden" id="searchCategory" name="searchCategory" th:value="${searchCategory}">
          <div class="dropdown-select">
            <button class="dropdown-toggle" type="button">
              <span class="selected-option">전체</span>
              <img th:src="@{/images/dropdown_arrow.png}" alt="dropdown arrow">
            </button>
            <ul class="dropdown-menu">
              <li data-value="all">전체</li>
              <li data-value="boardTitle">제목</li>
              <li data-value="boardContent">내용</li>
              <li data-value="boardWriter">작성자</li>
            </ul>
          </div>

          <div class="search-input-wrapper">
            <input type="text" name="searchKeyword" placeholder="검색어 입력"
                   th:data-value="${searchKeyword}">
          </div>
          <button class="search-btn" type="submit">
            <span>검색</span>
            <img th:src="@{/images/search_icon.png}" alt="search icon">
          </button>
        </form>
      </div>

      <!-- 게시글 목록 테이블 -->
      <div class="table-container">
        <table class="board-table">
          <thead>
            <tr>
              <th>번호</th>
              <th>제목</th>
              <th>작성자</th>
              <th>작성일</th>
              <th>진행현황</th>
              <th>조회수</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="board, stat : ${boardList}">
              <!-- 번호 역순 -->
              <td th:text="${totalCount - (pageSize * (currentPage - 1)) - stat.index}"></td>
              <td class="board-title" th:with="hasAtt=${board.originalFilename != null}">
              <span class="attach-icon" th:if="${hasAtt}" title="첨부파일 있음" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                     width="16" height="16">
                  <path d="M21.44 11.05l-8.49 8.49a5.5 5.5 0 01-7.78-7.78l8.49-8.49a3.5 3.5 0 114.95 4.95l-8.49 8.49a1.5 1.5 0 01-2.12-2.12l7.78-7.78"/>
                </svg>
                <span class="sr-only">첨부파일 있음</span>
              </span>
            
              <a th:href="@{/board/boardDetail(boardSeq=${board.boardSeq},
                                               searchCategory=${searchCategory},
                                               searchKeyword=${searchKeyword})}"
                 th:text="${board.boardTitle}"></a>
            </td>

              
              <td th:text="${board.maskedWriterName}"></td>
              <td th:text="${board.createDate != null ? #temporals.format(board.createDate, 'yyyy-MM-dd') : ''}"></td>
              <td>
                <span th:text="${#strings.trim(board.boardStatus) == '답변완료' ? '답변완료' : '진행중'}"
                    th:classappend="${#strings.trim(board.boardStatus) == '답변완료'} ? 'status-complete' : 'status-inprogress'">
            </span>
              </td>
              <td th:text="${board.hitCount}"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="board-footer-controls">
        <button type="button" class="write-post-btn" id="btn-write">글쓰기</button>
      </div>

   <!-- 페이지네이션: 그룹 표시 (navi 사용 / 안전 가드 포함) -->
   <nav class="pagination"
        th:if="${totalPages > 1 and navi != null and navi.startPageGroup >= 1 and navi.endPageGroup >= navi.startPageGroup}">
     <ul>
       <!-- 처음 / 이전 -->
       <li th:classappend="${currentPage == 1} ? 'disabled'">
         <a th:if="${currentPage > 1}"
            aria-label="첫 페이지"
            th:href="@{/board/boardList(page=1, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}">
           <!-- 왼쪽 이중 화살표 SVG -->
           <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 19l-7-7 7-7v14zm9 0l-7-7 7-7v14z"/></svg>
         </a>
       </li>
       <li th:classappend="${currentPage == 1} ? 'disabled'">
         <a th:if="${currentPage > 1}"
            aria-label="이전 페이지"
            th:href="@{/board/boardList(page=${currentPage - 1}, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}">
           <!-- 왼쪽 한 칸 화살표 SVG -->
           <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 19l-7-7 7-7v14z"/></svg>
         </a>
       </li>
   
       <!-- 그룹 숫자 -->
       <li th:each="p : ${#numbers.sequence(navi.startPageGroup, navi.endPageGroup)}">
         <a th:text="${p}"
            th:href="@{/board/boardList(page=${p}, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}"
            th:classappend="${p == currentPage} ? 'active' : ''"
            th:attr="aria-current=${p == currentPage} ? 'page' : null"></a>
       </li>
   
       <!-- 다음 / 마지막 -->
       <li th:classappend="${currentPage == totalPages} ? 'disabled'">
         <a th:if="${currentPage < totalPages}"
            aria-label="다음 페이지"
            th:href="@{/board/boardList(page=${currentPage + 1}, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}">
           <!-- 오른쪽 한 칸 화살표 SVG -->
           <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7V5z"/></svg>
         </a>
       </li>
       <li th:classappend="${currentPage == totalPages} ? 'disabled'">
         <a th:if="${currentPage < totalPages}"
            aria-label="마지막 페이지"
            th:href="@{/board/boardList(page=${totalPages}, searchCategory=${searchCategory}, searchKeyword=${searchKeyword})}">
           <!-- 오른쪽 이중 화살표 SVG -->
           <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5l7 7-7 7V5zm9 0l7 7-7 7V5z"/></svg>
         </a>
       </li>
     </ul>
   </nav>
     
    </div>
  </section>

  <!-- Footer 프래그먼트 삽입 -->
  <div th:replace="~{fragments/footer :: footerFragment}"></div>

</body>
</html>
