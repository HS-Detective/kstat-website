spring.application.name=project

# 포트번호 설정
server.port=8081

# DB (MySQL) 연동 설정
spring.datasource.url=jdbc:mysql://localhost:3306/dimaProject?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 로그에 출력되는 쿼리 포메팅
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=none

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 페이징을 위한 설정
user.board.pageLimit=10

# JPA가 DB와 날짜/시간 동기화할 때 사용할 타임존
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

# JSON 응답(Controller에서 @ResponseBody 등) 시 사용할 타임존
spring.jackson.time-zone=Asia/Seoul

# src/main/resources/application.properties
spring.config.import=optional:file:.env[.properties]
# chatapi관련

fastapi.base-url=${FASTAPI_BASE_URL:http://localhost:8001}
n8n.base-url=https://kitaa.app.n8n.cloud
n8n.api-key=kitadima2 
# 첨부파일이 있을 때
# 1) 업로드 파일의 용량제한: default 1M
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# 2) 서버의 HDD의 저장위치 설정
spring.servlet.multipart.location=c:/uploadPath

# Predict Server URL
iris.predict.server=http://127.0.0.1:8001/predict

# Supabase 설정
supabase.url=https://jrdknjgxdetvejrqscqv.supabase.co
supabase.serviceKey=${SUPABASE_SERVICE_KEY}

# 간단 캐시 (나중에 Caffeine으로 바꿔도 됨)
spring.cache.type=simple

# DummyDataSeeder 활성화
spring.profiles.active=local